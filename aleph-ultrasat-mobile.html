<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משימת אולטראסאט - האקדמיה לאסטרופיזיקה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; /* UV Purple */
            --primary-dark: #6d28d9;
            --secondary: #0ea5e9; /* Sky Blue */
            --accent: #f59e0b; /* Gold/Warning */
            --success: #10b981;
            --danger: #ef4444;
            --bg-space: #0f172a;
            --bg-panel: #1e293b;
            --text-light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Heebo', sans-serif; }

        body {
            background-color: var(--bg-space);
            color: var(--text-light);
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- Header --- */
        header {
            height: 60px; flex-shrink: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
        }
        .header-title { font-size: 1.5rem; font-weight: 900; color: var(--secondary); display: flex; align-items: center; gap: 10px; }
        .stats { display: flex; gap: 15px; align-items: center; }
        .score-box { background: rgba(245, 158, 11, 0.2); border: 2px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: 900; }
        .btn-menu, .btn-nikud { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-menu:hover, .btn-nikud:hover { background: rgba(255,255,255,0.2); }

        /* --- Main Layout --- */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        #canvas-wrapper { flex: 1.5; min-height: 40vh; position: relative; background: radial-gradient(circle at center, #1e293b, #020617); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }

        #canvas-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vmin; height: 80vmin; max-width: 300px; max-height: 300px;
            pointer-events: none; z-index: 5; display: flex; justify-content: center; align-items: center;
        }

        #ui-panel {
            flex: 1; background: var(--bg-panel); border-top: 3px solid var(--primary);
            display: flex; flex-direction: column; padding: 20px; overflow-y: auto;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); z-index: 10;
        }

        /* --- UI Elements --- */
        .mission-title { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .dialogue-box {
            font-size: 1.2rem; line-height: 1.5; color: #cbd5e1; margin-bottom: 20px; flex-shrink: 0;
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border-right: 4px solid var(--secondary);
            min-height: 80px;
        }
        .highlight { color: var(--accent); font-weight: 900; }

        .controls-container { display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        #next-level-wrap { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        button.btn-action {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white;
            border: none; padding: 15px; font-size: 1.3rem; font-weight: 900; border-radius: 15px; cursor: pointer;
            box-shadow: 0 6px 0 #4c1d95, 0 10px 20px rgba(0,0,0,0.3); transition: all 0.1s; text-align: center; width: 100%;
        }
        button.btn-action:active { transform: translateY(6px); box-shadow: 0 0 0 #4c1d95; }
        button.btn-success { background: linear-gradient(135deg, var(--success), #047857); box-shadow: 0 6px 0 #064e3b; }
        button.btn-success:active { box-shadow: 0 0 0 #064e3b; }
        
        .slider-group { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; text-align: center; position: relative;}
        .slider-group label { display: block; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: var(--secondary); }
        
        /* Spectrum Slider Custom - ACCURATE NON-VISIBLE BLACK BANDS */
        .spectrum-slider { 
            -webkit-appearance: none; width: 100%; height: 15px; border-radius: 10px; 
            background: linear-gradient(to right, 
                #111827 0%, #111827 45%, 
                #ef4444 45%, #f59e0b 50%, #10b981 55%, #0ea5e9 60%, #8b5cf6 65%, 
                #111827 65%, #111827 100%); 
            outline: none; margin-bottom: 25px; border: 1px solid #334155;
        }
        .spectrum-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%; background: white; border: 4px solid var(--bg-panel); cursor: pointer; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        .ticks-container { display: flex; justify-content: space-between; position: absolute; bottom: 5px; left: 15px; right: 15px; font-size: 0.8rem; font-weight: bold; color: #94a3b8; direction: ltr;}
        .tick { display: flex; flex-direction: column; align-items: center; position: absolute; transform: translateX(-50%);}
        .tick::before { content: ''; height: 8px; width: 2px; background: #cbd5e1; margin-bottom: 2px;}

        input[type=range]:not(.spectrum-slider) { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:not(.spectrum-slider)::-webkit-slider-runnable-track { width: 100%; height: 10px; background: #334155; border-radius: 5px; }
        input[type=range]:not(.spectrum-slider)::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--secondary); margin-top: -7px; box-shadow: 0 0 10px var(--secondary); cursor: pointer; }

        .info-box { background: rgba(14, 165, 233, 0.1); border: 1px solid var(--secondary); padding: 10px; border-radius: 10px; font-size: 1rem; color: #e0f2fe; margin-top: 10px; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center;}

        /* Progress Bar */
        .progress-wrap { margin-top: 10px; }
        .progress-label { text-align: center; font-weight: bold; margin-bottom: 5px; color: #94a3b8; }
        .progress-bar-bg { width: 100%; height: 15px; background: #0f172a; border-radius: 10px; overflow: hidden; border: 1px solid #334155; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.2s; }

        /* Quiz UI */
        .quiz-container { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; opacity: 1; transition: opacity 0.5s ease; }
        .quiz-container.fade-out { opacity: 0; }
        .quiz-btn { width: 100%; background: #334155; color: white; border: 2px solid #475569; padding: 12px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; text-align: right; transition: 0.2s; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .quiz-btn:hover { background: #475569; border-color: var(--secondary); }
        .quiz-btn svg { width: 24px; height: 24px; flex-shrink: 0; }

        /* Animations */
        .slow-mo-float { animation: slowFloat 6s ease-in-out infinite; }
        @keyframes slowFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .slow-spin { transform-origin: center; animation: slowSpin 20s linear infinite; }
        @keyframes slowSpin { 100% { transform: rotate(360deg); } }

        .slow-pulse { animation: slowPulse 4s ease-in-out infinite; }
        @keyframes slowPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        /* --- Overlays --- */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; text-align: center; padding: 20px; overflow-y: auto;
        }
        .hidden { display: none !important; }

        /* Level Menu */
        .level-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 800px; margin: 30px 0; width: 100%; }
        .level-card {
            background: rgba(255,255,255,0.05); border: 2px solid var(--primary); border-radius: 15px;
            padding: 15px; width: 140px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .level-card:hover { background: var(--primary); transform: translateY(-5px); }
        .level-card svg { width: 50px; height: 50px; }
        .level-card .lvl-num { font-size: 0.9rem; color: #cbd5e1; }
        .level-card .lvl-name { font-weight: bold; font-size: 1rem; line-height: 1.2; text-align:center; }
        .locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; border-color: #475569; }

        .msg-title { font-size: 3.5rem; color: var(--secondary); margin-bottom: 10px; text-shadow: 0 0 20px var(--secondary); }
        .msg-desc { font-size: 1.5rem; max-width: 600px; margin-bottom: 30px; line-height: 1.4; }

        /* --- Responsive Adjustments --- */
        @media (min-aspect-ratio: 4/3) { 
            main { flex-direction: row; }
            #canvas-wrapper { flex: 2; height: 100%; }
            #ui-panel { flex: 1; max-width: 450px; height: 100%; border-top: none; border-right: 3px solid var(--primary); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        }

        @media (max-width: 768px) {
            header { padding: 0 10px; height: 55px; }
            .header-title { font-size: 1.2rem; gap: 5px; }
            .header-title svg { width: 24px; height: 24px; }
            .stats { gap: 8px; }
            .btn-menu, .btn-nikud { padding: 5px 8px; font-size: 0.85rem; }
            .score-box { padding: 5px 10px; font-size: 0.9rem; }
            
            #canvas-wrapper { flex: none; height: 45vh; min-height: unset; }
            #ui-panel { padding: 15px; padding-bottom: 30px; border-top-width: 2px; }
            
            .mission-title { font-size: 1.4rem; margin-bottom: 5px; }
            .dialogue-box { font-size: 1.05rem; padding: 12px; margin-bottom: 15px; min-height: 60px; }
            
            .msg-title { font-size: 2.2rem; }
            .msg-desc { font-size: 1.1rem; margin-bottom: 20px; }
            #msg-icon { font-size: 4rem; margin-bottom: 10px; }
            #btn-msg-action { padding: 15px; font-size: 1.4rem; width: 90%; max-width: 300px; }
            
            .level-grid { gap: 10px; }
            .level-card { width: calc(50% - 10px); max-width: 140px; padding: 10px; }
            .level-card svg { width: 40px; height: 40px; }
            
            button.btn-action { font-size: 1.15rem; padding: 12px; }
            
            .spectrum-slider { height: 12px; margin-bottom: 20px; }
            .spectrum-slider::-webkit-slider-thumb { height: 24px; width: 24px; }
            .ticks-container { font-size: 0.65rem; bottom: 8px; }
        }

    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="var(--secondary)"><path d="M12 2L2 22h20L12 2zm0 4.5l6.5 13.5h-13L12 6.5z"/></svg>
            <span id="header-text">אולטראסאט</span>
        </div>
        <div class="stats">
            <button class="btn-nikud" id="btn-nikud">ניקוד: ✓</button>
            <button class="btn-menu" id="btn-menu">☰ שלבים</button>
            <div class="score-box">⭐ <span id="score-display">0</span></div>
        </div>
    </header>

    <main>
        <div id="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
            <div id="canvas-overlay"></div>
        </div>
        <div id="ui-panel">
            <div class="mission-title" id="ui-title"></div>
            <div class="dialogue-box" id="ui-desc"></div>
            <div class="controls-container" id="ui-controls"></div>
            <div id="next-level-wrap" class="hidden"></div>
            
            <div class="progress-wrap hidden" id="ui-progress">
                <div class="progress-label" id="prog-label">מתקדם...</div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
            </div>
        </div>
    </main>

    <div id="menu-overlay" class="overlay hidden">
        <h2 style="font-size: 3rem; color: white;">בחירת משימה</h2>
        <div class="level-grid" id="level-grid"></div>
        <button class="btn-action" id="btn-close-menu" style="width: 200px;">חזור</button>
    </div>

    <div id="msg-overlay" class="overlay">
        <div id="msg-icon" class="slow-mo-float">🛰️</div>
        <h1 class="msg-title" id="msg-title">פרויקט אולטראסאט</h1>
        <p class="msg-desc" id="msg-desc">הצטרפו לצוות המדענים! נחקור סופרנובות, כוכבי נייטרונים וחורים שחורים בעזרת טלסקופ ה-UV הישראלי.</p>
        <button class="btn-action btn-success" id="btn-msg-action">התחל מסע!</button>
    </div>

<script>
/** Audio System */
const AudioSys = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
    play(freq, type, dur, vol) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + dur);
    },
    click() { this.init(); this.play(800, 'sine', 0.05, 0.1); },
    success() { this.init(); this.play(523, 'sine', 0.1, 0.1); setTimeout(() => this.play(659, 'sine', 0.1, 0.1), 100); setTimeout(() => this.play(783, 'sine', 0.3, 0.1), 200); },
    error() { this.init(); this.play(200, 'sawtooth', 0.3, 0.1); setTimeout(() => this.play(150, 'sawtooth', 0.4, 0.1), 150); },
    blip() { this.init(); this.play(1200, 'square', 0.05, 0.05); },
    collect() { this.init(); this.play(1500, 'sine', 0.1, 0.05); setTimeout(() => this.play(2000, 'sine', 0.15, 0.05), 50); },
    boom() {
        this.init(); const bufSize = this.ctx.sampleRate * 2; const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate); const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource(); noise.buffer = buf;
        const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(1000, this.ctx.currentTime); filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 1.5);
        const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0.5, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1.5);
        noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); noise.start();
    }
};

/** SVGs for icons and Quiz */
const SVGS = {
    spectrum: `<svg viewBox="0 0 100 100"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#111827" /><stop offset="45%" style="stop-color:#111827" /><stop offset="45%" style="stop-color:#ef4444" /><stop offset="55%" style="stop-color:#10b981" /><stop offset="65%" style="stop-color:#8b5cf6" /><stop offset="65%" style="stop-color:#111827" /><stop offset="100%" style="stop-color:#111827" /></linearGradient></defs><rect x="10" y="40" width="80" height="20" rx="10" fill="url(#grad1)"/><path d="M10 50 Q30 20 50 50 T90 50" fill="none" stroke="white" stroke-width="3" opacity="0.8"/></svg>`,
    earth: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#0ea5e9"/><path d="M20 50 Q40 20 60 40 T90 50 Q70 80 40 70 T20 50" fill="#10b981"/></svg>`,
    fov: `<svg viewBox="0 0 100 100"><path d="M50 80 L10 20 A50 50 0 0 1 90 20 Z" fill="rgba(139, 92, 246, 0.5)" stroke="#8b5cf6" stroke-width="4"/><circle cx="50" cy="80" r="10" fill="#cbd5e1"/></svg>`,
    filter: `<svg viewBox="0 0 100 100"><circle cx="30" cy="50" r="15" fill="#ef4444"/><circle cx="70" cy="30" r="15" fill="#8b5cf6"/><circle cx="60" cy="70" r="10" fill="#f59e0b"/></svg>`,
    shock: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="#38bdf8"/><path d="M50 10 L50 90 M10 50 L90 50 M20 20 L80 80 M20 80 L80 20" stroke="white" stroke-width="4"/></svg>`,
    neutron: `<svg viewBox="0 0 100 100"><circle cx="35" cy="50" r="15" fill="#e0f2fe"/><circle cx="65" cy="50" r="15" fill="#e0f2fe"/><path d="M35 50 Q50 30 65 50" fill="none" stroke="#f59e0b" stroke-width="4" stroke-dasharray="5 5"/></svg>`,
    blackhole: `<svg viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="40" ry="15" fill="#f59e0b" opacity="0.8"/><circle cx="50" cy="50" r="20" fill="black" stroke="#ea580c" stroke-width="2"/></svg>`,
    alert: `<svg viewBox="0 0 100 100"><path d="M30 70 L50 30 L70 70" fill="none" stroke="#94a3b8" stroke-width="6"/><circle cx="50" cy="30" r="10" fill="#ef4444"/><path d="M30 20 Q50 0 70 20" fill="none" stroke="#38bdf8" stroke-width="4"/></svg>`,
    quiz: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="#10b981" stroke-width="8"/><path d="M50 25 Q65 25 65 40 Q65 55 50 60 L50 70" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round"/><circle cx="50" cy="85" r="5" fill="#10b981"/></svg>`,
    // Extended Quiz SVGs with CSS animations
    quiz_orbit: `<svg viewBox="0 0 100 100" style="width:100%; height:100%;"><circle cx="50" cy="50" r="25" fill="#0369a1" class="slow-pulse"/><g class="slow-spin"><circle cx="50" cy="50" r="40" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"/><rect x="85" y="45" width="10" height="10" fill="#cbd5e1"/></g></svg>`,
    quiz_fov: `<svg viewBox="0 0 100 100" style="width:100%; height:100%;" class="slow-mo-float"><path d="M50 90 L0 10 L100 10 Z" fill="rgba(139, 92, 246, 0.4)" stroke="#8b5cf6" stroke-width="2" class="slow-pulse"/><circle cx="50" cy="90" r="8" fill="white"/><circle cx="30" cy="30" r="5" fill="#f59e0b"/><circle cx="70" cy="40" r="4" fill="#38bdf8"/><circle cx="50" cy="20" r="6" fill="#ef4444"/></svg>`,
    quiz_gold: `<svg viewBox="0 0 100 100" style="width:100%; height:100%;"><g class="slow-spin"><circle cx="35" cy="50" r="15" fill="#e0f2fe"/><circle cx="65" cy="50" r="15" fill="#e0f2fe"/></g><circle cx="50" cy="50" r="6" fill="#f59e0b" class="slow-pulse"/></svg>`
};

/** State & Config */
const State = {
    lvl: 0, score: 0, useNikud: true, maxUnlocked: 0, isCompleted: false,
    getT(obj) { return obj ? (this.useNikud ? obj.n : obj.p) : ''; }
};

const DOM = {
    canvas: document.getElementById('game-canvas'), ctx: document.getElementById('game-canvas').getContext('2d'),
    title: document.getElementById('ui-title'), desc: document.getElementById('ui-desc'),
    controls: document.getElementById('ui-controls'), 
    nextLevelWrap: document.getElementById('next-level-wrap'),
    progWrap: document.getElementById('ui-progress'), progLabel: document.getElementById('prog-label'), progFill: document.getElementById('prog-fill'),
    score: document.getElementById('score-display'), nikudBtn: document.getElementById('btn-nikud'),
    menuBtn: document.getElementById('btn-menu'), menuOverlay: document.getElementById('menu-overlay'),
    levelGrid: document.getElementById('level-grid'), msgOverlay: document.getElementById('msg-overlay'),
    msgTitle: document.getElementById('msg-title'), msgDesc: document.getElementById('msg-desc'),
    msgBtn: document.getElementById('btn-msg-action'), btnCloseMenu: document.getElementById('btn-close-menu')
};

let CtxObj = { particles: [], stars: [], vw: 0, vh: 0 };
let currentLevelLogic = null;
let animFrame = null;

function resize() {
    DOM.canvas.width = document.getElementById('canvas-wrapper').clientWidth;
    DOM.canvas.height = document.getElementById('canvas-wrapper').clientHeight;
    CtxObj.vw = DOM.canvas.width; CtxObj.vh = DOM.canvas.height;
    if (CtxObj.stars.length === 0) {
        for(let i=0; i<150; i++) CtxObj.stars.push({ x: Math.random()*2000, y: Math.random()*2000, size: Math.random()*2, blink: Math.random()*0.05 });
    }
}
window.addEventListener('resize', resize);

/** Particles Helper */
function spawnParticles(x, y, color, count, type='circle') {
    for(let i=0; i<count; i++) {
        let speed = (type === 'gold' || type === 'slow-confetti') ? 2 : 15;
        CtxObj.particles.push({ x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, color, life: 1.0, size: Math.random()*6+2, type });
    }
}
function drawParticles(ctx) {
    for(let i=CtxObj.particles.length-1; i>=0; i--) {
        let p = CtxObj.particles[i];
        p.x += p.vx; p.y += p.vy;
        if(p.type === 'confetti') p.vy += 0.2; 
        if(p.type === 'slow-confetti') p.vy += 0.05; 
        if(p.type === 'gold') p.vy += 0.01; 
        p.life -= (p.type==='gold' || p.type==='slow-confetti') ? 0.005 : 0.02;
        
        ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.translate(p.x, p.y);
        ctx.fillStyle = p.color;
        if (p.type === 'circle') { ctx.beginPath(); ctx.arc(0,0, p.size, 0, Math.PI*2); ctx.fill(); }
        else if (p.type === 'gold') { ctx.font = "bold 16px Arial"; ctx.fillText("Au", 0,0); }
        else { ctx.rotate(p.life*10); ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); }
        ctx.restore();
        if(p.life <= 0) CtxObj.particles.splice(i, 1);
    }
}

/** Telescope Drawer on Canvas */
function drawTelescope(ctx, type, x, y, scale=1) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    if(type === 'alma') {
        ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.arc(0, -10, 30, 0, Math.PI, true); ctx.fill();
        ctx.fillRect(-5, 0, 10, 30);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(0, -15, 5, 0, Math.PI*2); ctx.fill();
    } else if(type === 'webb') {
        ctx.fillStyle = "#f8fafc"; ctx.beginPath(); ctx.ellipse(0, 20, 50, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fbbf24"; ctx.strokeStyle = "#b45309"; ctx.lineWidth = 1;
        const hex = (hx, hy) => { ctx.beginPath(); for(let i=0;i<6;i++) { ctx.lineTo(hx + 12*Math.cos(i*Math.PI/3), hy + 12*Math.sin(i*Math.PI/3)); } ctx.closePath(); ctx.fill(); ctx.stroke(); };
        hex(0, -10); hex(0, -31); hex(0, 11); hex(-18, -20); hex(-18, 1); hex(18, -20); hex(18, 1);
    } else if(type === 'hubble') {
        ctx.fillStyle = "#94a3b8"; ctx.fillRect(-15, -35, 30, 70);
        ctx.fillStyle = "#38bdf8"; ctx.fillRect(-65, -10, 50, 20); ctx.fillRect(15, -10, 50, 20);
        ctx.fillStyle = "black"; ctx.fillRect(-10, -35, 20, 10);
    } else if(type === 'chandra') {
        ctx.fillStyle = "#cbd5e1"; ctx.fillRect(-10, -40, 20, 80);
        ctx.fillStyle = "#1e40af";
        ctx.save(); ctx.translate(-10, 0); ctx.rotate(Math.PI/8); ctx.fillRect(-40, -10, 40, 20); ctx.restore();
        ctx.save(); ctx.translate(10, 0); ctx.rotate(-Math.PI/8); ctx.fillRect(0, -10, 40, 20); ctx.restore();
    } else if(type === 'ultrasat') {
        drawSat(ctx, 0, 0, 1, 0);
    }
    ctx.restore();
}

function drawSat(ctx, x, y, scale = 1, fovAngle = 0) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.fillStyle = "#1e40af"; ctx.strokeStyle = "#60a5fa"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(-70, -10, 40, 20, 2); ctx.fill(); ctx.stroke(); 
    ctx.beginPath(); ctx.roundRect(30, -10, 40, 20, 2); ctx.fill(); ctx.stroke(); 
    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(-20, -20, 40, 40); ctx.strokeRect(-20, -20, 40, 40); 
    ctx.fillStyle = "#38bdf8"; ctx.beginPath(); ctx.arc(0, -20, 15, Math.PI, 0); ctx.fill(); ctx.stroke(); 
    if(fovAngle > 0) {
        ctx.fillStyle = "rgba(139, 92, 246, 0.2)"; ctx.beginPath(); ctx.moveTo(0, -20);
        let rad = fovAngle * Math.PI / 180;
        ctx.lineTo(-Math.sin(rad)*400, -20 - Math.cos(rad)*400); ctx.arc(0, -20, 400, -Math.PI/2 - rad, -Math.PI/2 + rad); ctx.lineTo(0, -20); ctx.fill();
    }
    ctx.restore();
}

        desc: {p: "מוכנים להפוך לחוקרים רשמיים בצוות אולטראסאט?", n: "מוּכָנִים לַהֲפֹךְ לְחוֹקְרִים רִשְׁמִיִּים בְּצֶוֶת אוּלְטְרָאסָאט?"},
        state: { qIdx: 0, questions: [
            { svg: SVGS.quiz_orbit, q: {p:"באיזה מסלול יימצא טלסקופ אולטראסאט?",n:"בְּאֵיזֶה מַסְלוּל יִמָּצֵא טֶלֶסְקוֹפּ אוּלְטְרָאסָאט?"}, a: [{t:{p:"מסלול נמוך (LEO)",n:"מַסְלוּל נָמוּךְ (LEO)"},c:0}, {t:{p:"מסלול גיאוסטציונרי (GEO)",n:"מַסְלוּל גֵּיאוֹסְטַצְיוֹנָרִי (GEO)"},c:1}, {t:{p:"במסלול סביב הירח",n:"בְּמַסְלוּל סְבִיב הַיָּרֵחַ"},c:0}] },
            { svg: SVGS.quiz_fov, q: {p:"מהו היתרון המרכזי של אולטראסאט?",n:"מַהוּ הַיִּתְרוֹן הַמֶּרְכָּזִי שֶׁל אוּלְטְרָאסָאט?"}, a: [{t:{p:"שדה ראייה עצום של מעל 200 מעלות רבועות",n:"שְׂדֵה רְאִיָּה עָצוּם שֶׁל מֵעַל 200 מַעֲלוֹת רְבוּעוֹת"},c:1}, {t:{p:"הוא הגדול ביותר שנבנה אי פעם",n:"הוּא הַגָּדוֹל בְּיוֹתֵר שֶׁנִּבְנָה אֵי פַּעַם"},c:0}, {t:{p:"הוא יכול לצלם דרך עננים בכדור הארץ",n:"הוּא יָכוֹל לְצַלֵּם דֶּרֶךְ עֲנָנִים בְּכַדּוּר הָאָרֶץ"},c:0}] },
            { svg: SVGS.quiz_gold, q: {p:"מה נוצר ממיזוג של כוכבי נייטרונים?",n:"מָה נוֹצָר מִמִּזּוּג שֶׁל כּוֹכְבֵי נִיְּטְרוֹנִים?"}, a: [{t:{p:"יסודות קלים כמו חמצן",n:"יְסוֹדוֹת קַלִּים כְּמוֹ חַמְצָן"},c:0}, {t:{p:"מתכות כבדות כמו זהב ופלטינה",n:"מַתָּכוֹת כְּבֵדוֹת כְּמוֹ זָהָב וּפְלָטִינָה"},c:1}] }
        ]},
        init: function() { this.state.qIdx = 0; },
        ui: function(container) { 
            container.innerHTML = '<div id="q-container" class="quiz-container"></div>';
            this.renderQ(document.getElementById('q-container')); 
        },
        renderQ: function(container) {
            container.classList.remove('fade-out');
            container.innerHTML = '';
            let qd = this.state.questions[this.state.qIdx];
            
            document.getElementById('canvas-overlay').innerHTML = qd.svg;

            let title = document.createElement('h3'); title.style.color="white"; title.style.textAlign="center"; title.style.marginBottom="15px"; title.innerText = State.getT(qd.q); container.appendChild(title);
            qd.a.forEach(ans => {
                let btn = document.createElement('button'); btn.className = 'quiz-btn'; btn.innerHTML = `<svg viewBox="0 0 24 24" fill="var(--secondary)"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm-1 14.5l-4-4 1.4-1.4 2.6 2.6 6.6-6.6 1.4 1.4-8 8z"/></svg> ${State.getT(ans.t)}`;
                btn.onclick = () => {
                    if(ans.c) { 
                        AudioSys.success(); spawnParticles(CtxObj.vw/2, CtxObj.vh/2, "#10b981", 40, 'slow-confetti'); 
                        this.state.qIdx++; 
                        container.classList.add('fade-out');
                        setTimeout(() => {
                            if(this.state.qIdx >= this.state.questions.length) {
                                document.getElementById('canvas-overlay').innerHTML = '';
                                levelComplete({p:"מזל טוב! הוסמכתם כחוקרים בצוות אולטראסאט. העתיד של חקר החלל נמצא בידיים שלכם!",n:"מַזָּל טוֹב! הוּסְמַכְתֶּם כְּחוֹקְרִים בְּצֶוֶת אוּלְטְרָאסָאט. הֶעָתִיד שֶׁל חֵקֶר הֶחָלָל נִמְצָא בַּיָּדַיִם שֶׁלָּכֶם!"}); 
                            }
                            else this.renderQ(container);
                        }, 500);
                    }
                    else { AudioSys.error(); btn.style.borderColor = "red"; btn.style.background = "#450a0a"; setTimeout(()=> {btn.style.borderColor=""; btn.style.background="";}, 500); }
                }; container.appendChild(btn);
            });
        },
        update: function() {}, draw: function(ctx, w, h) { ctx.fillStyle = "rgba(16, 185, 129, 0.1)"; ctx.beginPath(); ctx.arc(w/2, h/2, 150 + Math.sin(Date.now()/500)*30, 0, Math.PI*2); ctx.fill(); }
    }
];

/** Engine Core */
function updateProgress(percent) { DOM.progFill.style.width = Math.min(100, Math.max(0, percent)) + '%'; }
function showProgress(textObj) { DOM.progWrap.classList.remove('hidden'); DOM.progLabel.innerText = State.getT(textObj); DOM.progFill.style.width = '0%'; }

function loadLevel(idx) {
    State.lvl = idx; currentLevelLogic = Levels[idx]; State.isCompleted = false; 
    DOM.menuOverlay.classList.add('hidden'); DOM.msgOverlay.classList.add('hidden');
    DOM.title.innerHTML = `${currentLevelLogic.icon} ${State.getT(currentLevelLogic.title)}`;
    DOM.nextLevelWrap.innerHTML = ''; DOM.nextLevelWrap.classList.add('hidden');
    document.getElementById('canvas-overlay').innerHTML = ''; // Clear SVG overlay
    typeText(DOM.desc, State.getT(currentLevelLogic.desc));
    DOM.controls.innerHTML = ''; DOM.progWrap.classList.add('hidden');
    currentLevelLogic.init(); currentLevelLogic.ui(DOM.controls);
}

function levelComplete(msgObj) {
    if (State.isCompleted) return; State.isCompleted = true; 
    AudioSys.success(); spawnParticles(CtxObj.vw/2, CtxObj.vh/2, "#f59e0b", 50, 'confetti');
    State.score += 100; DOM.score.innerText = State.score;
    if(State.lvl >= State.maxUnlocked) State.maxUnlocked = Math.min(Levels.length-1, State.lvl + 1);
    
    // Type description but keep controls intact!
    typeText(DOM.desc, State.getT(msgObj));
    
    // Add next level button in a dedicated wrapper below controls
    DOM.nextLevelWrap.innerHTML = '';
    DOM.nextLevelWrap.classList.remove('hidden');
    let btn = document.createElement('button'); btn.className = 'btn-action btn-success'; btn.innerText = State.getT({p:"המשך לשלב הבא",n:"הַמְשֵׁךְ לַשָּׁלָב הַבָּא"});
    btn.onclick = () => { AudioSys.click(); if(State.lvl < Levels.length-1) loadLevel(State.lvl + 1); else openMenu(); };
    DOM.nextLevelWrap.appendChild(btn);
}

function loop() {
    if(!currentLevelLogic) { requestAnimationFrame(loop); return; }
    let ctx = DOM.ctx, w = CtxObj.vw, h = CtxObj.vh; ctx.clearRect(0,0,w,h);
    // Stars BG
    ctx.fillStyle = "white";
    CtxObj.stars.forEach(s => { s.size += s.blink; if(s.size>2 || s.size<0.5) s.blink = -s.blink; ctx.globalAlpha = Math.random()*0.5+0.5; ctx.beginPath(); ctx.arc(s.x%w, s.y%h, s.size, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1.0;
    
    currentLevelLogic.update(w, h); currentLevelLogic.draw(ctx, w, h); drawParticles(ctx);
    animFrame = requestAnimationFrame(loop);
}

let typingInt = null;
function typeText(el, text) {
    if(typingInt) clearInterval(typingInt); el.innerHTML = "";
    let chars = text.split(''); let i = 0;
    typingInt = setInterval(() => {
        if(i < chars.length) { 
            if(chars[i] === '<') { let tag=''; while(chars[i]!=='>'&&i<chars.length){tag+=chars[i];i++;} tag+='>'; el.innerHTML+=tag; }
            else { el.innerHTML += chars[i]; }
            i++; 
        } else clearInterval(typingInt);
    }, 20);
}

function openMenu() {
    AudioSys.click(); DOM.menuOverlay.classList.remove('hidden'); DOM.levelGrid.innerHTML = '';
    Levels.forEach((l, i) => {
        let card = document.createElement('div'); card.className = `level-card ${i > State.maxUnlocked ? 'locked' : ''}`;
        card.innerHTML = `${l.icon}<div class="lvl-num">שלב ${i+1}</div><div class="lvl-name">${State.getT(l.title)}</div>`;
        if(i <= State.maxUnlocked) card.onclick = () => { AudioSys.click(); loadLevel(i); };
        DOM.levelGrid.appendChild(card);
    });
}

/** Events */
DOM.msgBtn.addEventListener('click', () => { AudioSys.init(); DOM.msgOverlay.classList.add('hidden'); loadLevel(0); resize(); loop(); });
DOM.menuBtn.addEventListener('click', openMenu);
DOM.btnCloseMenu.addEventListener('click', () => { AudioSys.click(); DOM.menuOverlay.classList.add('hidden'); });
DOM.nikudBtn.addEventListener('click', () => { 
    State.useNikud = !State.useNikud; DOM.nikudBtn.innerText = `ניקוד: ${State.useNikud ? '✓' : '✗'}`; 
    if(currentLevelLogic) { DOM.title.innerHTML = `${currentLevelLogic.icon} ${State.getT(currentLevelLogic.title)}`; typeText(DOM.desc, State.getT(currentLevelLogic.desc)); }
    if(DOM.menuOverlay.classList.contains('hidden') === false) openMenu();
});
DOM.canvas.addEventListener('pointerdown', (e) => {
    if(currentLevelLogic && currentLevelLogic.handleClick) {
        let rect = DOM.canvas.getBoundingClientRect();
        currentLevelLogic.handleClick(e.clientX - rect.left, e.clientY - rect.top);
    }
});

resize();
</script>
</body>
</html>
